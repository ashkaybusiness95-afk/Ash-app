function AILettersPage({ tenants, wide }) {
  const [type, setType]         = useState("rent-increase");
  const [selTenant, setSelTenant] = useState(tenants[0]?.id || "");
  const [customRate, setCustomRate] = useState(5);
  const [customMsg, setCustomMsg]   = useState("");
  const [result, setResult]     = useState("");
  const [loading, setLoading]   = useState(false);
  const [copied, setCopied]     = useState(false);

  const t = tenants.find(x=>x.id===selTenant);
  const p = t ? PROPS.find(x=>x.id===t.pid) : null;
  const newRent = t ? Math.round(t.rn * (1 + customRate/100)) : 0;

  const LETTER_TYPES = [
    { id:"rent-increase",   label:"Rent increase notice" },
    { id:"maintenance",     label:"Maintenance visit notice" },
    { id:"late-rent",       label:"Late rent reminder" },
    { id:"renewal",         label:"Tenancy renewal offer" },
    { id:"custom",          label:"Custom message" },
  ];

  const buildPrompt = () => {
    const base = `You are helping Ash, a self-managing landlord in Leeds, write a personal and professional message to one of his tenants.
Ash is friendly, direct and professional — not robotic. Keep it warm and human. No legal jargon. Maximum 150 words.
Tenant name: ${t?.nm || "tenant"}
Property: ${p?.n || "the property"}
`;
    switch(type) {
      case "rent-increase":
        return base + `Write a rent increase letter. Current rent is ${t?t.rn:0} per month. New rent will be £${newRent} per month (a ${customRate}% increase). Give 1 month's notice. Be apologetic but firm. Explain it's to keep up with costs. Keep it personal.`;
      case "maintenance":
        return base + `Write a maintenance visit notice. Ash needs to arrange access. Message should ask when the tenant is available this week or next. Keep it short and friendly.`;
      case "late-rent":
        return base + `Write a polite but firm late rent reminder. Rent was due on the ${t?.dy || 1}${t?.dy===1?"st":t?.dy===2?"nd":t?.dy===3?"rd":"th"} of the month. Keep it friendly — this may be a genuine oversight. Don't be threatening.`;
      case "renewal":
        return base + `Write a tenancy renewal offer. Offer to continue on a new fixed term or rolling basis. Keep it positive — Ash wants to keep good tenants.`;
      case "custom":
        return base + `Write a message with this context: ${customMsg}. Keep it personal, friendly and professional.`;
      default: return base;
    }
  };

  const generate = async () => {
    if (!t) return;
    setLoading(true);
    setResult("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:400,
          messages:[{ role:"user", content:buildPrompt() }]
        })
      });
      const data = await res.json();
      const text = data.content?.map(c=>c.text||"").join("") || "Sorry, couldn't generate. Try again.";
      setResult(text);
    } catch(e) {
      setResult("Something went wrong — check your connection and try again.");
    }
    setLoading(false);
  };

  const copy = () => {
    navigator.clipboard.writeText(result).catch(()=>{});
    setCopied(true);
    setTimeout(()=>setCopied(false), 2000);
  };

  return (
    <div>
      <div style={{ background:S.abg, borderRadius:11, padding:"10px 14px", marginBottom:14, fontSize:12, color:S.atx }}>
        ✉️ Pick the type of message, select a tenant and tap Generate. The AI writes a personal letter in your voice — not robotic. Edit it before sending.
      </div>

      <div style={{ ...card, ...cardPad }}>
        <div style={{ fontSize:11, color:S.gray, marginBottom:4 }}>Message type</div>
        <Sel value={type} onChange={e=>setType(e.target.value)}>
          {LETTER_TYPES.map(l=><option key={l.id} value={l.id}>{l.label}</option>)}
        </Sel>

        <div style={{ fontSize:11, color:S.gray, marginBottom:4 }}>Tenant</div>
        <Sel value={selTenant} onChange={e=>setSelTenant(e.target.value)}>
          {tenants.map(t2=>{
            const p2=PROPS.find(x=>x.id===t2.pid);
            return <option key={t2.id} value={t2.id}>{t2.nm} — {p2?p2.n:""}</option>;
          })}
        </Sel>

        {type === "rent-increase" && (
          <div style={{ marginBottom:8 }}>
            <div style={{ fontSize:11, color:S.gray, marginBottom:4 }}>Increase rate: {customRate}%</div>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:4 }}>
              <input type="range" min="1" max="20" step="0.5" value={customRate} onChange={e=>setCustomRate(parseFloat(e.target.value))} style={{ flex:1 }} />
              <span style={{ fontSize:14, fontWeight:700 }}>{customRate}%</span>
            </div>
            {t && <div style={{ fontSize:11, color:S.gray }}>{gbp(t.rn)}/mo → <span style={{ color:S.green, fontWeight:700 }}>{gbp(newRent)}/mo</span></div>}
          </div>
        )}

        {type === "custom" && (
          <div style={{ marginBottom:8 }}>
            <div style={{ fontSize:11, color:S.gray, marginBottom:4 }}>Describe what you need</div>
            <textarea value={customMsg} onChange={e=>setCustomMsg(e.target.value)} placeholder="e.g. I need to arrange an inspection next week..." style={{ width:"100%", border:"1px solid #e2e8f0", borderRadius:10, padding:"10px 12px", fontSize:14, fontFamily:"system-ui", resize:"none", height:70, outline:"none" }} />
          </div>
        )}

        <Btn onClick={generate} style={{ marginBottom:0 }}>
          {loading ? "✍️ Writing..." : "✨ Generate Letter"}
        </Btn>
      </div>

      {result && (
        <div style={{ ...card, ...cardPad, marginTop:10 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
            <div style={{ fontSize:13, fontWeight:600 }}>Generated message</div>
            <button onClick={copy} style={{ background:copied?S.green:S.light, color:copied?"#fff":S.dark, border:"none", borderRadius:8, padding:"5px 12px", fontSize:12, fontWeight:600, cursor:"pointer", fontFamily:"system-ui" }}>
              {copied ? "✓ Copied!" : "Copy"}
            </button>
          </div>
          <div style={{ fontSize:13, lineHeight:1.8, color:S.dark, whiteSpace:"pre-wrap" }}>{result}</div>
          <div style={{ fontSize:11, color:S.gray, marginTop:10 }}>✏️ Review and edit before sending. This is a starting point, not a final draft.</div>
        </div>
      )}
    </div>
  );
}

function DealCheckPage({ wide }) {
  const [f, setF] = useState({ price:"", rent:"", rate:5.5, deposit:25, costs:"", reno:"" });
  const [result, setResult] = useState(null);

  const analyse = () => {
    const price    = parseFloat(f.price) || 0;
    const rent     = parseFloat(f.rent)  || 0;
    const rate     = parseFloat(f.rate)  || 5.5;
    const deposit  = parseFloat(f.deposit) / 100;
    const costs    = parseFloat(f.costs)  || Math.round(price * 0.03); // stamp duty estimate
    const reno     = parseFloat(f.reno)   || 0;
    const mortgage = Math.round(price * (1-deposit));
    const monthlyInterest = Math.round(mortgage * rate / 100 / 12);
    const ncf      = rent - monthlyInterest;
    const grossYield = price > 0 ? ((rent*12)/price*100).toFixed(2) : 0;
    const netYield = price > 0 ? ((ncf*12)/price*100).toFixed(2) : 0;
    const totalIn  = Math.round(price * deposit) + costs + reno;
    const cashROI  = totalIn > 0 ? ((ncf*12)/totalIn*100).toFixed(1) : 0;

    // Compare to existing portfolio
    const portYield = 6.5; // approximate from existing portfolio
    const stacks = parseFloat(grossYield) >= 6 && ncf > 0;

    setResult({ price, rent, mortgage, monthlyInterest, ncf, grossYield, netYield, totalIn, cashROI, stacks, rate, deposit:f.deposit });
  };

  return (
    <div>
      <div style={{ background:S.abg, borderRadius:11, padding:"10px 14px", marginBottom:14, fontSize:12, color:S.atx }}>
        Enter the numbers for a property you're looking at. We'll tell you instantly whether it stacks up against your existing portfolio.
      </div>

      <div style={{ ...card, ...cardPad }}>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
          <div><div style={{ fontSize:11, color:S.gray, marginBottom:3 }}>Asking price (£)</div><Inp type="number" value={f.price} onChange={e=>setF(x=>({...x,price:e.target.value}))} placeholder="e.g. 150000" style={{marginBottom:0}} /></div>
          <div><div style={{ fontSize:11, color:S.gray, marginBottom:3 }}>Expected rent/mo (£)</div><Inp type="number" value={f.rent} onChange={e=>setF(x=>({...x,rent:e.target.value}))} placeholder="e.g. 850" style={{marginBottom:0}} /></div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginTop:8 }}>
          <div>
            <div style={{ fontSize:11, color:S.gray, marginBottom:3 }}>Mortgage rate: {f.rate}%</div>
            <input type="range" min="3" max="9" step="0.1" value={f.rate} onChange={e=>setF(x=>({...x,rate:e.target.value}))} style={{ width:"100%" }} />
          </div>
          <div>
            <div style={{ fontSize:11, color:S.gray, marginBottom:3 }}>Deposit: {f.deposit}%</div>
            <input type="range" min="20" max="40" step="5" value={f.deposit} onChange={e=>setF(x=>({...x,deposit:e.target.value}))} style={{ width:"100%" }} />
          </div>
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginTop:8 }}>
          <div><div style={{ fontSize:11, color:S.gray, marginBottom:3 }}>Buying costs (£)</div><Inp type="number" value={f.costs} onChange={e=>setF(x=>({...x,costs:e.target.value}))} placeholder="Stamp duty, legal..." style={{marginBottom:0}} /></div>
          <div><div style={{ fontSize:11, color:S.gray, marginBottom:3 }}>Renovation (£)</div><Inp type="number" value={f.reno} onChange={e=>setF(x=>({...x,reno:e.target.value}))} placeholder="Works needed" style={{marginBottom:0}} /></div>
        </div>
        <Btn onClick={analyse} style={{ marginTop:12, marginBottom:0 }}>Analyse This Deal</Btn>
      </div>

      {result && (
        <div>
          <div style={{ ...card, ...cardPad, background: result.stacks ? "#f0fdf4" : "#fff5f5", borderColor: result.stacks ? "#bbf7d0" : "#fecaca", marginTop:10 }}>
            <div style={{ fontSize:15, fontWeight:700, color:result.stacks?S.green:S.red, marginBottom:4 }}>
              {result.stacks ? "✅ This deal stacks up" : "⚠️ This deal needs scrutiny"}
            </div>
            <div style={{ fontSize:12, color:S.dark, lineHeight:1.7 }}>
              {result.stacks
                ? `At ${result.grossYield}% gross yield and ${gbp(result.ncf)}/mo net cash flow after the mortgage, this property performs solidly. Your existing portfolio averages around 6.5% so this is competitive.`
                : `At ${result.grossYield}% gross yield${result.ncf < 0 ? " and negative cash flow of "+gbp(Math.abs(result.ncf))+"/mo" : ""}, this deal is below the threshold you should be targeting. Consider negotiating the price down or finding higher rent potential.`
              }
            </div>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginTop:10 }}>
            {[
              {l:"Gross yield",       v:result.grossYield+"%",           g:parseFloat(result.grossYield)>=6},
              {l:"Monthly mortgage",  v:gbp(result.monthlyInterest)+"/mo",g:false},
              {l:"Net cash flow",     v:(result.ncf>=0?"":"-")+gbp(Math.abs(result.ncf))+"/mo", g:result.ncf>0},
              {l:"Total cash in",     v:gbp(result.totalIn),             g:false},
              {l:"Cash-on-cash ROI",  v:result.cashROI+"%",              g:parseFloat(result.cashROI)>=8},
              {l:"Mortgage",          v:gbp(result.mortgage),            g:false},
            ].map((k,i)=>(
              <div key={i} style={{ background:"#fff", borderRadius:14, border:"1px solid #e2e8f0", padding:12 }}>
                <div style={{ fontSize:11, color:S.gray, marginBottom:3 }}>{k.l}</div>
                <div style={{ fontSize:16, fontWeight:700, color:k.g?S.green:S.dark }}>{k.v}</div>
              </div>
            ))}
          </div>
          <div style={{ fontSize:11, color:S.gray, marginTop:8, lineHeight:1.6 }}>
            Note: Stamp duty for additional properties is 5% on the full purchase price (as of 2024). Remember to factor in management time, void periods and maintenance reserves.
          </div>
        </div>
      )}
    </div>
  );
}

function AIStrategyPage({tenants, jobs, rp, outgoings}) {
  const [res, setRes] = useState("");
  const [load, setLoad] = useState(false);
  const [tab, setTab] = useState("");
  const inc = tenants.reduce(function(s,t){return s+t.rn;}, 0);
  const mtg = MTGS.filter(function(m){return m.l !== "70 Coal Hill Lane (Home)";}).reduce(function(s,m){return s+m.m;}, 0);
  const eq = PROPS.reduce(function(s,p){return s+(p.v-p.mtg);}, 0);
  const ms = mKey(CYR, CMO);
  const jc = jobs.filter(function(j){return j.status==="done"&&j.date&&j.date.startsWith(ms);}).reduce(function(s,j){return s+(j.cost||0);}, 0);
  const oc = PROPS.reduce(function(s,p){return s+(outgoings[p.id+"-"+ms]||[]).reduce(function(x,o){return x+(o.amount||0);},0);}, 0);
  const netInc = inc - mtg - jc - oc;
  const base = "Leeds landlord: " + PROPS.length + " units, 2 HMO + " + (PROPS.length-2) + " BTL, target 50 by 2036. Rent " + gbp(inc) + "/mo, net " + gbp(netInc) + "/mo, equity " + gbp(eq) + ".";
  const prompts = {
    strategy: base + " Give 4 specific ways to scale faster. Be direct.",
    finance: base + " Best 3 finance options for next deal. Which suits him?",
    next: base + " BTL or HMO next? Specific Leeds recommendation."
  };
  function go(t) {
    var k = localStorage.getItem("ash-api-key") || "";
    if (!k) { setRes("Save your API key in More > AI Letter Writer first."); setTab(t); return; }
    setTab(t); setLoad(true); setRes("");
    fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type":"application/json","x-api-key":k,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:350, messages:[{role:"user",content:prompts[t]}]})
    }).then(function(r){return r.json();}).then(function(d){
      setRes(d.content ? d.content.map(function(c){return c.text||"";}).join("") : "Error.");
      setLoad(false);
    }).catch(function(){setRes("Connection error."); setLoad(false);});
  }
  return (
    <div>
      <div style={{background:"#1e293b", borderRadius:13, padding:12, marginBottom:12, display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, color:"#fff"}}>
        <div style={{background:"rgba(255,255,255,0.08)", borderRadius:9, padding:9, textAlign:"center"}}>
          <div style={{fontSize:10, color:"#64748b"}}>Rent</div>
          <div style={{fontSize:12, fontWeight:700, color:"#4ade80"}}>{gbp(inc)}/mo</div>
        </div>
        <div style={{background:"rgba(255,255,255,0.08)", borderRadius:9, padding:9, textAlign:"center"}}>
          <div style={{fontSize:10, color:"#64748b"}}>Net</div>
          <div style={{fontSize:12, fontWeight:700, color:"#4ade80"}}>{gbp(netInc)}/mo</div>
        </div>
        <div style={{background:"rgba(255,255,255,0.08)", borderRadius:9, padding:9, textAlign:"center"}}>
          <div style={{fontSize:10, color:"#64748b"}}>Equity</div>
          <div style={{fontSize:12, fontWeight:700, color:"#4ade80"}}>{gbp(eq)}</div>
        </div>
      </div>
      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8, marginBottom:12}}>
        <button onClick={function(){go("strategy");}} style={{padding:"10px 4px", borderRadius:10, border:"none", cursor:"pointer", fontFamily:"system-ui", fontWeight:600, fontSize:12, background:tab==="strategy"&&res?"#1e293b":S.light, color:tab==="strategy"&&res?"#fff":S.dark}}>
          {load&&tab==="strategy"?"...":"Growth"}
        </button>
        <button onClick={function(){go("finance");}} style={{padding:"10px 4px", borderRadius:10, border:"none", cursor:"pointer", fontFamily:"system-ui", fontWeight:600, fontSize:12, background:tab==="finance"&&res?"#1e293b":S.light, color:tab==="finance"&&res?"#fff":S.dark}}>
          {load&&tab==="finance"?"...":"Finance"}
        </button>
        <button onClick={function(){go("next");}} style={{padding:"10px 4px", borderRadius:10, border:"none", cursor:"pointer", fontFamily:"system-ui", fontWeight:600, fontSize:12, background:tab==="next"&&res?"#1e293b":S.light, color:tab==="next"&&res?"#fff":S.dark}}>
          {load&&tab==="next"?"...":"Next Buy"}
        </button>
      </div>
      {load && <div style={{textAlign:"center", padding:"24px", color:S.gray}}>Analysing your portfolio...</div>}
      {res && !load && (
        <div style={{background:"#fff", borderRadius:13, border:"1px solid #e2e8f0", padding:14}}>
          <div style={{fontSize:13, lineHeight:1.8, whiteSpace:"pre-wrap"}}>{res}</div>
        </div>
      )}
      {!res && !load && (
        <div style={{textAlign:"center", padding:"24px", color:S.gray, fontSize:12}}>
          Tap a button above for AI advice based on your real numbers.
          <div style={{marginTop:6, color:S.amber}}>Requires API key from console.anthropic.com</div>
        </div>
      )}
    </div>
  );
}

            <div style={{ background:"#fff", borderRadius:10, padding:10 }}><div style={{ fontSize:11, color:S.gray }}>Mortgage</div><div style={{ fontSize:16, fontWeight:700, color:S.red }}>{gbp(p.mm)}/mo</div></div>

}
