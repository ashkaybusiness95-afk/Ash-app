function LoginScreen({ onLogin }) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState(false);
  const attempt = () => {
    if (pw === PASS) {
      localStorage.setItem(AUTH_KEY, String(Date.now()));
      onLogin();
    } else { setErr(true); setPw(""); }
  };
  return (
    <div style={{ minHeight:"100vh", background:S.dark, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:32 }}>
      <div style={{ fontSize:52 }}>🏠</div>
      <div style={{ color:"#fff", fontSize:22, fontWeight:700, margin:"16px 0 4px" }}>Portfolio Manager</div>
      <div style={{ color:S.gray, fontSize:13, marginBottom:28 }}>Enter your password to continue</div>
      <input type="password" value={pw} placeholder="Password"
        onChange={e => { setPw(e.target.value); setErr(false); }}
        onKeyDown={e => e.key === "Enter" && attempt()}
        style={{ width:"100%", maxWidth:300, padding:"14px 16px", borderRadius:12, border:"1.5px solid #334155", background:"#0f172a", color:"#fff", fontSize:16, marginBottom:12, outline:"none", fontFamily:"system-ui" }}
      />
      <button onClick={attempt} style={{ width:"100%", maxWidth:300, padding:14, borderRadius:12, background:"#3b82f6", color:"#fff", fontSize:15, fontWeight:600, border:"none", cursor:"pointer", fontFamily:"system-ui" }}>
        Log In
      </button>
      {err && <div style={{ color:"#f87171", fontSize:13, marginTop:10 }}>Incorrect password. Try again.</div>}
    </div>
  );
}

function getAlerts(comp) {
  const a = [];
  MTGS.forEach(m => {
    const d = du(m.e);
    if (d === null)  a.push({ t:"a", msg: m.l + ": expiry unknown" });
    else if (d <= 0) a.push({ t:"r", msg: m.l + ": mortgage EXPIRED" });
    else if (d <= 180) a.push({ t:"r", msg: m.l + ": expires in " + d + " days — contact broker" });
    else if (d <= 365) a.push({ t:"a", msg: m.l + ": expires in " + d + " days" });
  });
  PROPS.filter(p => p.vc).forEach(p => a.push({ t:"a", msg: p.n + ": vacant — not yet let" }));
  comp.forEach(c => {
    const d = du(c.next);
    if (c.next && d <= 60) {
      const ct = CTYPES.find(x => x.k === c.type);
      const pp = PROPS.find(p => p.id === c.pid);
      a.push({ t:"r", msg: (pp ? pp.n : "") + ": " + (ct ? ct.l : "") + " " + (d < 0 ? "OVERDUE" : d + "d left") });
    }
  });
  return a;
}

            <span style={{ fontSize:13, fontWeight:600, color:"#fff" }}>Action needed</span>
            <span style={{ background:"#ef4444", color:"#fff", fontSize:11, fontWeight:700, padding:"2px 8px", borderRadius:99 }}>{actions.filter(a=>a.priority==="r").length} urgent</span>

              <span style={{ fontSize:16, flexShrink:0 }}>{a.icon}</span>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:12, fontWeight:600, color:a.priority==="r"?S.red:S.amber }}>{a.category}</div>
                <div style={{ fontSize:12, color:S.dark, lineHeight:1.4 }}>{a.msg}</div>
              </div>
            </div>
          ))}

      {actions.length === 0 && (
        <div style={{ ...card, ...cardPad, background:"#f0fdf4", borderColor:"#bbf7d0", marginBottom:10, display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:20 }}>✅</span>
          <div>
            <div style={{ fontSize:13, fontWeight:600, color:S.green }}>All clear</div>
            <div style={{ fontSize:11, color:"#15803d" }}>Nothing urgent needs your attention today</div>
          </div>
        </div>
      )}

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <button onClick={()=>{const d=new Date(selYr,selMo-1,1);setSelYr(d.getFullYear());setSelMo(d.getMonth());}} style={{width:36,height:36,borderRadius:"50%",border:"1px solid #e2e8f0",background:"#fff",cursor:"pointer",fontSize:18}}>&#8249;</button>
        <span style={{fontSize:15,fontWeight:700}}>{MFULL[selMo]} {selYr}</span>
        <button onClick={()=>{const d=new Date(selYr,selMo+1,1);if(d<=new Date(CYR,CMO,1)){setSelYr(d.getFullYear());setSelMo(d.getMonth());}}} disabled={isCur} style={{width:36,height:36,borderRadius:"50%",border:"1px solid #e2e8f0",background:isCur?"#f8fafc":"#fff",cursor:isCur?"default":"pointer",fontSize:18,color:isCur?S.gray:"inherit"}}>&#8250;</button>
      </div>
      <div style={{...card,...cardPad}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <div style={{background:"#f0fdf4",borderRadius:12,padding:12}}>
            <div style={{fontSize:11,color:S.gtx,fontWeight:600}}>Income</div>
            <div style={{fontSize:20,fontWeight:700,color:S.green}}>{gbp(pr)}</div>
            <div style={{fontSize:11,color:S.gray}}>{tenants.filter(t=>rp[t.id+"-"+selYr+"-"+selMo]).length} of {tenants.length} paid</div>
          </div>
          <div style={{background:"#fff5f5",borderRadius:12,padding:12}}>
            <div style={{fontSize:11,color:S.rtx,fontWeight:600}}>Outgoings</div>
            <div style={{fontSize:20,fontWeight:700,color:S.red}}>{gbp(totalOut)}</div>
            <div style={{fontSize:11,color:S.gray}}>mortgages + bills + jobs</div>
          </div>
        </div>
        <div style={{borderTop:"1px solid #f1f5f9",paddingTop:10}}>
          {[["Mortgages",gbp(tm)],["Bills",gbp(oc)],["Job costs",gbp(jc)]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <span style={{fontSize:12,color:S.gray}}>{l}</span><span style={{fontSize:12,fontWeight:600}}>{v}</span>
            </div>
          ))}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:ncf>=0?"#f0fdf4":"#fff5f5",borderRadius:10,padding:"10px 12px",marginTop:6}}>
            <span style={{fontSize:13,fontWeight:700,color:ncf>=0?S.green:S.red}}>Net this month</span>

      </div>
      {wide ? (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
          <div>{stats}</div>
          <div>{propList}</div>

        <>{stats}{propList}</>
      )}

    </div>
  );
}

function RentPage({ tenants, rp, toggleRent, expMap, toggleExp, addTenant }) {
  const [selYr, setSelYr] = useState(CYR);
  const [selMo, setSelMo] = useState(CMO);
  const [addingTo, setAddingTo] = useState(null);
  const [form, setForm] = useState({ name:"", dy:"", rn:"" });

  const months = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(CYR, CMO - i, 1);
    months.push({ y: d.getFullYear(), m: d.getMonth() });
  }

  const doAdd = pid => {
    if (!form.name || !form.rn) return;
    const p = PROPS.find(x => x.id === pid);
    const rooms = tenants.filter(t => t.pid === pid);
    addTenant({ pid, rm: p && p.ty === "HMO" ? "Room " + (rooms.length + 1) : "Whole", nm: form.name, dy: parseInt(form.dy) || 1, rn: parseFloat(form.rn) || 0, dp: null, rv: null, nt: "" });
    setAddingTo(null);
    setForm({ name:"", dy:"", rn:"" });
  };

  const totalRent   = tenants.reduce((s, t) => s + t.rn, 0);
  const paidRent    = tenants.filter(t => rp[t.id + "-" + selYr + "-" + selMo]).reduce((s, t) => s + t.rn, 0);
  const paidCount   = tenants.filter(t => rp[t.id + "-" + selYr + "-" + selMo]).length;
  const stillDue    = totalRent - paidRent;
  const rentPct     = totalRent > 0 ? Math.round(paidRent / totalRent * 100) : 0;

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10, flexWrap:"wrap" }}>
        <button onClick={() => { const d = new Date(selYr, selMo - 1, 1); setSelYr(d.getFullYear()); setSelMo(d.getMonth()); }} style={{ padding:"6px 12px", borderRadius:9, border:"1px solid #e2e8f0", background:"#fff", cursor:"pointer", fontSize:14 }}>‹</button>
        <span style={{ fontSize:14, fontWeight:600 }}>{MFULL[selMo]} {selYr}</span>
        <button onClick={() => { const d = new Date(selYr, selMo + 1, 1); if (d <= new Date(CYR, CMO, 1)) { setSelYr(d.getFullYear()); setSelMo(d.getMonth()); } }} style={{ padding:"6px 12px", borderRadius:9, border:"1px solid #e2e8f0", background:"#fff", cursor:"pointer", fontSize:14 }}>›</button>
        {(selYr !== CYR || selMo !== CMO) && <span style={{ fontSize:11, color:S.amber, fontWeight:600 }}>Editing past month</span>}
      </div>

      <div style={{ ...card, ...cardPad, marginBottom:10 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
          <div>
            <span style={{ fontSize:22, fontWeight:700 }}>{gbp(paidRent)}</span>
            <span style={{ color:S.gray, fontSize:13 }}> / {gbp(totalRent)}</span>
            <div style={{ fontSize:11, color:S.gray, marginTop:3 }}>{paidCount} of {tenants.length} paid</div>
          </div>
          <Badge color={stillDue === 0 ? "green" : "amber"}>{stillDue === 0 ? "All paid" : paidCount + " paid"}</Badge>
        </div>
        <div style={{ height:7, background:S.light, borderRadius:99, overflow:"hidden", marginBottom:stillDue>0?8:0 }}>
          <div style={{ height:"100%", background:"#22c55e", borderRadius:99, width:rentPct+"%" }} />
        </div>
        {stillDue > 0 && (
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:"#fff5f5", borderRadius:10, padding:"8px 12px" }}>
            <span style={{ fontSize:12, color:S.red, fontWeight:600 }}>Still to come in</span>
            <span style={{ fontSize:14, fontWeight:700, color:S.red }}>{gbp(stillDue)}</span>
          </div>
        )}
      </div>

      {PROPS.map(p => {
        const pt   = tenants.filter(t => t.pid === p.id);
        const paid = pt.filter(t => rp[t.id + "-" + selYr + "-" + selMo]);
        const all  = pt.length > 0 && paid.length === pt.length;

        if (p.vc && !pt.length) return (
          <div key={p.id} style={{ ...card, ...cardPad, background:"#fffbeb", borderColor:"#fde68a" }}>
            <div style={{ fontSize:13, fontWeight:600, color:"#92400e" }}>{p.n}</div>
            <div style={{ fontSize:11, color:S.amber }}>Vacant</div>
          </div>
        );

        if (p.ty === "BTL") {
          const t = pt[0]; if (!t) return null;
          const ip = !!rp[t.id + "-" + selYr + "-" + selMo];
          return (
            <div key={p.id} style={{ ...card, ...cardPad, ...(ip ? { background:"#f0fdf4", borderColor:"#bbf7d0" } : {}) }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <div style={{ fontSize:13, fontWeight:600 }}>{p.n}</div>
                  <div style={{ fontSize:11, color:S.gray }}>{t.nm} · due {t.dy}{sx(t.dy)}</div>
                  <div style={{ fontSize:11, color:S.gray }}>{gbp(t.rn)}/mo</div>
                </div>
                <button onClick={() => toggleRent(t.id, selYr, selMo)} style={{ width:50, height:50, borderRadius:"50%", border:"none", cursor:"pointer", background:ip?"#22c55e":"#e2e8f0", color:ip?"#fff":S.gray, fontSize:20, display:"flex", alignItems:"center", justifyContent:"center" }}>
                  {ip ? "✓" : "○"}
                </button>
              </div>
            </div>
          );
        }

        const open = expMap[p.id];
        return (
          <div key={p.id} style={{ ...card, ...(all ? { borderColor:"#bbf7d0" } : {}) }}>
            <button onClick={() => toggleExp(p.id)} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"13px 14px", cursor:"pointer", background:all?"#f0fdf4":"#fff", width:"100%", border:"none", textAlign:"left", fontFamily:"system-ui" }}>
              <div>
                <div style={{ fontSize:13, fontWeight:600 }}>{p.n} <span style={{ fontSize:11, color:S.gray, fontWeight:400 }}>HMO</span></div>
                <div style={{ fontSize:11, color:S.gray }}>{paid.length}/{pt.length} paid · {gbp(pt.reduce((s, t) => s + t.rn, 0))}/mo</div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <Badge color={all?"green":paid.length>0?"amber":"gray"}>{all?"All paid":(pt.length-paid.length)+" unpaid"}</Badge>
                <span style={{ color:"#cbd5e1", fontSize:16, display:"inline-block", transform:open?"rotate(90deg)":"none", transition:"transform .2s" }}>›</span>
              </div>
            </button>
            {open && (
              <div style={{ borderTop:"1px solid #f1f5f9" }}>
                {pt.map(t => {
                  const ip = !!rp[t.id + "-" + selYr + "-" + selMo];
                  return (
                    <div key={t.id} style={{ padding:"11px 14px", display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:"1px solid #f8fafc", background:ip?"#f0fdf4":"#fff" }}>
                      <div>
                        <div style={{ fontSize:13 }}>{t.rm} · <span style={{ fontWeight:600 }}>{t.nm}</span></div>
                        <div style={{ fontSize:11, color:S.gray }}>{gbp(t.rn)}/mo · due {t.dy}{sx(t.dy)}</div>
                      </div>
                      <button onClick={() => toggleRent(t.id, selYr, selMo)} style={{ width:40, height:40, borderRadius:"50%", border:"none", cursor:"pointer", background:ip?"#22c55e":"#e2e8f0", color:ip?"#fff":S.gray, fontSize:16, display:"flex", alignItems:"center", justifyContent:"center" }}>
                        {ip ? "✓" : "○"}
                      </button>
                    </div>
                  );
                })}
                <div style={{ padding:"10px 14px" }}>
                  {addingTo === p.id ? (
                    <div>
                      <Inp placeholder="Name *" value={form.name} onChange={e => setForm(f => ({ ...f, name:e.target.value }))} />
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                        <Inp placeholder="Pay day" type="number" value={form.dy} onChange={e => setForm(f => ({ ...f, dy:e.target.value }))} style={{ marginBottom:0 }} />
                        <Inp placeholder="Rent/mo" type="number" value={form.rn} onChange={e => setForm(f => ({ ...f, rn:e.target.value }))} style={{ marginBottom:0 }} />
                      </div>
                      <div style={{ display:"flex", gap:8, marginTop:8 }}>
                        <Btn onClick={() => doAdd(p.id)} style={{ flex:1, padding:10, marginBottom:0 }}>Add Tenant</Btn>
                        <button onClick={() => setAddingTo(null)} style={{ padding:"10px 14px", borderRadius:10, background:S.light, border:"none", cursor:"pointer", fontFamily:"system-ui", fontWeight:600 }}>Cancel</button>
                      </div>
                    </div>
                  ) : (
                    <button onClick={() => setAddingTo(p.id)} style={{ fontSize:12, color:S.mid, fontWeight:600, background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:4, padding:"4px 0", fontFamily:"system-ui" }}>+ Add room</button>
                  )}
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function JobsPage({ jobs, addJob, updateJob, deleteJob, wide }) {
  const [show, setShow]   = useState(false);
  const [edit, setEdit]   = useState(null);
  const [f, setF]         = useState({ pid:"", desc:"", cost:"", cont:"", cat:"" });
  const [editF, setEditF] = useState({});

  const submit = () => {
    if (!f.desc) return;
    addJob({ pid:f.pid, desc:f.desc, cost:0, cont:f.cont, cat:f.cat });
    setF({ pid:"", desc:"", cost:"", cont:"", cat:"" });
    setShow(false);
  };

  const saveEdit = id => {
    const c2=parseFloat(editF.cost)||0,cj=jobs.find(j=>j.id===id);
    updateJob(id,{desc:editF.desc,cont:editF.cont,cat:editF.cat,cost:c2,status:c2>0?"done":(cj?cj.status:"open")});
    setEdit(null);
  };

  const oj = jobs.filter(j => j.status === "open");
  const dj = jobs.filter(j => j.status === "done");

  const JCard = ({ j }) => {
    const p = PROPS.find(x => x.id === j.pid);
    const isEdit = edit === j.id;
    return (
      <div style={{ ...card, ...cardPad, ...(j.status === "done" ? { opacity:.8 } : {}) }}>
        {isEdit ? (
          <div>
            <div style={{ fontSize:12, fontWeight:600, color:S.gray, marginBottom:8 }}>Edit Job</div>
            <Inp value={editF.desc} onChange={e => setEditF(x => ({ ...x, desc:e.target.value }))} placeholder="Description" />
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
              <Inp placeholder="Cost (£)" type="number" value={editF.cost} onChange={e => setEditF(x => ({ ...x, cost:e.target.value }))} style={{ marginBottom:0 }} />
              <Inp placeholder="Contractor" value={editF.cont} onChange={e => setEditF(x => ({ ...x, cont:e.target.value }))} style={{ marginBottom:0 }} />
            </div>
            <Sel value={editF.cat} onChange={e => setEditF(x => ({ ...x, cat:e.target.value }))} style={{ marginTop:8 }}>
              <option value="">Category...</option>
              {JCATS.map(c => <option key={c}>{c}</option>)}
            </Sel>
            <div style={{ display:"flex", gap:8 }}>
              <Btn onClick={() => saveEdit(j.id)} style={{ flex:1, padding:10, marginBottom:0 }}>Save</Btn>
              <button onClick={() => setEdit(null)} style={{ padding:"10px 14px", borderRadius:10, background:S.light, border:"none", cursor:"pointer", fontFamily:"system-ui", fontWeight:600 }}>Cancel</button>
            </div>
          </div>
        ) : (
          <div style={{ display:"flex", alignItems:"flex-start", gap:8 }}>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:13, fontWeight:600, color:j.status==="done"?S.gray:S.dark, textDecoration:j.status==="done"?"line-through":"none" }}>{j.desc}</div>
              {p && <div style={{ fontSize:11, color:S.gray }}>{p.n}</div>}
              <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginTop:6 }}>
                {j.cat  && <Badge color="gray">{j.cat}</Badge>}
                {j.cost > 0 && <span style={{ fontSize:12, fontWeight:600 }}>{gbp(j.cost)}</span>}
                {!j.cost && j.status === "open" && <span style={{ fontSize:11, color:S.amber }}>No cost yet — edit to add</span>}
                {j.cont && <span style={{ fontSize:11, color:S.gray }}>{j.cont}</span>}
                <span style={{ fontSize:11, color:"#cbd5e1" }}>{j.date}</span>
              </div>
            </div>
            <div style={{ display:"flex", gap:6, flexShrink:0 }}>
              <button onClick={() => { setEdit(j.id); setEditF({ desc:j.desc, cost:j.cost||"", cont:j.cont||"", cat:j.cat||"" }); }} style={{ width:36, height:36, borderRadius:"50%", border:"none", cursor:"pointer", background:S.light, fontSize:14 }}>✏️</button>
              <button onClick={() => updateJob(j.id, { status:j.status==="done"?"open":"done" })} style={{ width:36, height:36, borderRadius:"50%", border:"none", cursor:"pointer", background:j.status==="done"?"#bbf7d0":"#dcfce7", fontSize:16 }}>✓</button>
              <button onClick={() => deleteJob(j.id)} style={{ width:36, height:36, borderRadius:"50%", border:"none", cursor:"pointer", background:S.rbg, fontSize:14 }}>✕</button>
            </div>
          </div>
        )}
      </div>
    );
  };

  const grid = wide ? { display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 } : {};

  return (
    <div>
      <Btn onClick={() => setShow(true)}>+ Log Maintenance Job</Btn>
      {show && (
        <div style={{ ...card, ...cardPad }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:10 }}>
            <span style={{ fontWeight:600 }}>New Job</span>
            <button onClick={() => setShow(false)} style={{ background:"none", border:"none", fontSize:18, cursor:"pointer" }}>✕</button>
          </div>
          <Sel value={f.pid} onChange={e => setF(x => ({ ...x, pid:e.target.value }))}>
            <option value="">Select property...</option>
            {PROPS.map(p => <option key={p.id} value={p.id}>{p.n}</option>)}
          </Sel>
          <Inp placeholder="Description *" value={f.desc} onChange={e => setF(x => ({ ...x, desc:e.target.value }))} />
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            <Inp placeholder="Contractor" value={f.cont} onChange={e => setF(x => ({ ...x, cont:e.target.value }))} style={{ marginBottom:0 }} />
            <Sel value={f.cat} onChange={e => setF(x => ({ ...x, cat:e.target.value }))} style={{ marginBottom:0 }}>
              <option value="">Category...</option>
              {JCATS.map(c => <option key={c}>{c}</option>)}
            </Sel>
          </div>
          <div style={{ fontSize:11, color:S.gray, margin:"6px 0 10px" }}>💡 Log the job now — add the cost afterwards when you know it</div>
          <div style={{ display:"flex", gap:8 }}>
            <Btn onClick={submit} style={{ flex:1, padding:10, marginBottom:0 }}>Save Job</Btn>
            <button onClick={() => setShow(false)} style={{ padding:"10px 14px", borderRadius:10, background:S.light, border:"none", cursor:"pointer", fontFamily:"system-ui", fontWeight:600 }}>Cancel</button>
          </div>
        </div>
      )}
      <div style={grid}>
        <div>
          {oj.length > 0 && <><div style={{ fontSize:11, fontWeight:700, color:S.gray, textTransform:"uppercase", letterSpacing:".5px", marginBottom:8 }}>Open ({oj.length})</div>{oj.map(j => <JCard key={j.id} j={j} />)}</>}
          {!jobs.length && !show && <div style={{ textAlign:"center", padding:"50px 0", color:S.gray }}><div style={{ fontSize:36, marginBottom:10 }}>🔧</div><div>No jobs logged yet</div></div>}
        </div>
        <div>
          {dj.length > 0 && <><div style={{ fontSize:11, fontWeight:700, color:S.gray, textTransform:"uppercase", letterSpacing:".5px", marginBottom:8 }}>Completed ({dj.length})</div>{dj.map(j => <JCard key={j.id} j={j} />)}</>}
        </div>
      </div>
    </div>
  );
}

function MtgsPage() {
  const sorted = [...MTGS].sort((a, b) => (du(a.e) || 9999) - (du(b.e) || 9999));
  const mSt = e => {
    const d = du(e);
    if (d === null)  return { color:"amber", label:"Unknown" };
    if (d <= 0)      return { color:"red",   label:"EXPIRED" };
    if (d <= 180)    return { color:"red",   label:d+"d" };
    if (d <= 365)    return { color:"amber", label:d+"d" };
    return                 { color:"green",  label:"OK" };
  };
  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
        <div style={{ background:"#fff", borderRadius:14, border:"1px solid #e2e8f0", padding:12 }}>
          <div style={{ fontSize:11, color:S.gray, marginBottom:3 }}>Total Debt</div>
          <div style={{ fontSize:19, fontWeight:700 }}>{gbp(MTGS.reduce((s, m) => s + m.b, 0))}</div>
        </div>
        <div style={{ background:"#fff", borderRadius:14, border:"1px solid #e2e8f0", padding:12 }}>
          <div style={{ fontSize:11, color:S.gray, marginBottom:3 }}>Monthly</div>
          <div style={{ fontSize:19, fontWeight:700 }}>{gbp(MTGS.reduce((s, m) => s + m.m, 0))}</div>
        </div>
      </div>
      {sorted.map((m, i) => {
        const { color, label } = mSt(m.e);
        const d = du(m.e);
        const bg = d != null && d <= 180 ? "#fff5f5" : d != null && d <= 365 ? "#fffbeb" : "#fff";
        return (
          <div key={i} style={{ ...card, ...cardPad, background:bg }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
              <div style={{ flex:1, paddingRight:8 }}>
                <div style={{ fontSize:13, fontWeight:600 }}>{m.l}</div>
                <div style={{ fontSize:11, color:S.gray }}>{m.ldr}{m.ac ? " · " + m.ac : ""}</div>
              </div>
              <Badge color={color}>{label}</Badge>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:7 }}>
              {[["Balance",gbp(m.b)],["Rate",m.r!=null?m.r+"%":"Unknown"],["/month",gbp(m.m)]].map(([l2,v]) => (

function CompPage({ comp, updateComp, wide }) {
  const urg = comp.filter(c => { const d = du(c.next); return c.next && d <= 60; }).length;
  const unk = comp.filter(c => !c.next).length;
  const cSt = item => {
    if (!item.next) return { color:"amber", label:"Unknown" };
    const d = du(item.next);
    if (d < 0)    return { color:"red",   label:"OVERDUE" };
    if (d <= 60)  return { color:"red",   label:d+"d left" };
    if (d <= 180) return { color:"amber", label:d+"d left" };
    return              { color:"green",  label:"OK" };
  };
  const grid = wide ? { display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 } : {};
  return (
    <div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
        <div style={{ background:urg>0?S.rbg:"#f0fdf4", borderRadius:14, border:"1px solid #e2e8f0", padding:12 }}>
          <div style={{ fontSize:11, color:S.gray, marginBottom:3 }}>Due / Overdue</div>
          <div style={{ fontSize:24, fontWeight:700, color:urg>0?S.red:S.green }}>{urg}</div>
        </div>
        <div style={{ background:unk>0?S.abg:"#f0fdf4", borderRadius:14, border:"1px solid #e2e8f0", padding:12 }}>
          <div style={{ fontSize:11, color:S.gray, marginBottom:3 }}>Unknown</div>
          <div style={{ fontSize:24, fontWeight:700, color:unk>0?S.amber:S.green }}>{unk}</div>
        </div>
      </div>
      <div style={grid}>
        {PROPS.map(p => {
          const items = comp.filter(c => c.pid === p.id);
          if (!items.length) return null;
          return (
            <div key={p.id} style={card}>
              <div style={{ padding:"11px 14px", background:"#f8fafc", borderBottom:"1px solid #f1f5f9" }}>
                <div style={{ fontSize:13, fontWeight:600 }}>{p.n}</div>
                <div style={{ fontSize:11, color:S.gray }}>{p.town} · {p.ty}</div>
              </div>
              {items.map((item, i) => {
                const { color, label } = cSt(item);
                const ct = CTYPES.find(x => x.k === item.type);
                return (
                  <div key={item.id} style={{ padding:"11px 14px", borderBottom:i<items.length-1?"1px solid #f8fafc":"none" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7 }}>
                      <div>
                        <div style={{ fontSize:13, fontWeight:600 }}>{ct ? ct.l : item.type}</div>
                        <div style={{ fontSize:11, color:S.gray }}>{ct ? ct.n : ""} · {item.next ? "Due: "+new Date(item.next).toLocaleDateString("en-GB") : "Add dates below"}</div>
                      </div>
                      <Badge color={color}>{label}</Badge>
                    </div>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:7, marginBottom:7 }}>
                      <div>
                        <div style={{ fontSize:11, color:S.gray, marginBottom:3 }}>Last cert</div>
                        <input type="date" value={item.last||""} onChange={e => updateComp(item.id, { last:e.target.value })} style={{ width:"100%", border:"1px solid #e2e8f0", borderRadius:9, padding:"6px 8px", fontSize:12, fontFamily:"system-ui" }} />
                      </div>
                      <div>
                        <div style={{ fontSize:11, color:S.gray, marginBottom:3 }}>Next due</div>
                        <input type="date" value={item.next||""} onChange={e => updateComp(item.id, { next:e.target.value })} style={{ width:"100%", border:"1px solid #e2e8f0", borderRadius:9, padding:"6px 8px", fontSize:12, fontFamily:"system-ui" }} />
                      </div>
                    </div>
                    <input placeholder="Notes..." value={item.notes||""} onChange={e => updateComp(item.id, { notes:e.target.value })} style={{ width:"100%", border:"1px solid #e2e8f0", borderRadius:9, padding:"6px 8px", fontSize:12, fontFamily:"system-ui" }} />

function FinPage({ tenants, jobs, rp, outgoings, wide }) {
  const [view, setView]       = useState("summary");
  const [selProp, setSelProp] = useState(PROPS[0].id);
  const [selYr, setSelYr]     = useState(CYR);

  const tr  = tenants.reduce((s, t) => s + t.rn, 0);
  const tm  = PROPS.reduce((s, p) => s + p.mm, 0);
  const ms  = mKey(CYR, CMO);
  const jc  = jobs.filter(j => j.status==="done" && j.date && j.date.startsWith(ms)).reduce((s, j) => s + (j.cost||0), 0);
  // total outgoings this month across all properties
  const oc  = PROPS.reduce((s, p) => {
    const k = p.id + "-" + ms;
    return s + (outgoings[k]||[]).reduce((x, o) => x + (o.amount||0), 0);
  }, 0);
  const ncf = tr - tm - jc - oc;
  const tv  = PROPS.reduce((s, p) => s + p.v, 0);
  const td  = PROPS.reduce((s, p) => s + p.mtg, 0);
  const eq  = tv - td;
  const gy  = ((tr*12)/tv*100).toFixed(1);

  const propMonths = pid => {
    const p  = PROPS.find(x => x.id === pid);
    const pt = tenants.filter(t => t.pid === pid);
    const months = [];
    let ytdRent = 0, ytdCosts = 0, ytdMtg = 0, ytdOut = 0;
    for (let m = 0; m < 12; m++) {
      const y  = selYr;
      const mk = mKey(y, m);
      const rent  = pt.filter(t => rp[t.id+"-"+y+"-"+m]).reduce((s, t) => s + t.rn, 0);
      const costs = jobs.filter(j => j.status==="done" && j.pid===pid && j.date && j.date.startsWith(mk)).reduce((s, j) => s + (j.cost||0), 0);
      const outs  = (outgoings[pid+"-"+mk]||[]).reduce((s, o) => s + (o.amount||0), 0);
      const mtg   = p ? p.mm : 0;
      const net   = rent - mtg - costs - outs;
      ytdRent += rent; ytdCosts += costs; ytdMtg += mtg; ytdOut += outs;
      months.push({ m, y, rent, costs, mtg, outs, net, mk });
    }
    return { months, ytdRent, ytdCosts, ytdMtg, ytdOut, ytdNet: ytdRent - ytdMtg - ytdCosts - ytdOut };
  };

  const { months, ytdRent, ytdCosts, ytdMtg, ytdOut, ytdNet } = propMonths(selProp);

  return (
    <div>
      <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap" }}>
        {[["summary","Summary"],["charts","Charts"],["per-property","Per Property"]].map(([v,l]) => (
          <button key={v} onClick={() => setView(v)} style={{ padding:"8px 14px", borderRadius:10, border:"1px solid #e2e8f0", background:view===v?S.dark:"#fff", color:view===v?"#fff":S.dark, fontWeight:600, fontSize:13, cursor:"pointer", fontFamily:"system-ui" }}>
            {l}
          </button>
        ))}
      </div>

      {view === "charts" && <FinCharts tenants={tenants} jobs={jobs} rp={rp} outgoings={outgoings} />}

      {view === "summary" && (
        <div>
          <div style={{ display:"grid", gridTemplateColumns:wide?"repeat(4,1fr)":"1fr 1fr", gap:10, marginBottom:12 }}>
            {[
              {l:"Portfolio Value",   v:gbp(tv),  s:PROPS.length+" properties",                    g:false},
              {l:"Total Equity",      v:gbp(eq),  s:Math.round(eq/tv*100)+"% of value",g:true},
              {l:"Total Debt",        v:gbp(td),  s:Math.round(td/tv*100)+"% LTV",     g:false},
              {l:"Gross Yield",       v:gy+"%",   s:"Annual rent / value",             g:true},
              {l:"Monthly Rent",      v:gbp(tr),  s:"Gross income",                    g:true},
              {l:"Monthly Mortgages", v:gbp(tm),  s:"All properties",                  g:false},
              {l:"Monthly Outgoings", v:gbp(oc),  s:"Bills & expenses",                g:false},
              {l:"This Month Net",    v:(ncf>=0?"":"-")+gbp(Math.abs(ncf)), s:"After all costs", g:ncf>0},
              {l:"Annual Income",     v:gbp(tr*12),s:"Gross",                          g:true},
            ].map((k, i) => (
              <div key={i} style={{ background:"#fff", borderRadius:14, border:"1px solid #e2e8f0", padding:12 }}>
                <div style={{ fontSize:11, color:S.gray, marginBottom:3 }}>{k.l}</div>
                <div style={{ fontSize:18, fontWeight:700, color:k.g?S.green:S.dark }}>{k.v}</div>
                <div style={{ fontSize:11, color:S.gray, marginTop:2 }}>{k.s}</div>
              </div>
            ))}
          </div>
          <Btn onClick={() => {
            const lines = [
              "PORTFOLIO FINANCIAL REPORT",
              "Generated: " + now.toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}),
              "",
              "── PORTFOLIO SUMMARY ──",
              "Portfolio Value:     " + gbp(tv),
              "Total Equity:        " + gbp(eq) + " (" + Math.round(eq/tv*100) + "%)",
              "Total Debt:          " + gbp(td),
              "Gross Yield:         " + gy + "%",
              "",
              "── THIS MONTH ──",
              "Monthly Rent:        " + gbp(tr),
              "Monthly Mortgages:   " + gbp(tm),
              "Monthly Outgoings:   " + gbp(oc),
              "Net Cash Flow:       " + (ncf>=0?"":"-") + gbp(Math.abs(ncf)),
              "",
              "── PER PROPERTY ──",
              ...PROPS.map(p => {
                const r = tenants.filter(t=>t.pid===p.id).reduce((s,t)=>s+t.rn,0);
                return p.n + ": " + gbp(r) + "/mo rent — " + gbp(p.mm) + "/mo mortgage — net " + gbp(r-p.mm) + "/mo";
              }),
            ].join("\n");
            const blob = new Blob([lines],{type:"text/plain"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "portfolio-report-" + now.toISOString().split("T")[0] + ".txt";
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
          }}>📄 Download Portfolio Report</Btn>
        </div>
      )}

      {view === "per-property" && (
        <div>
          <div style={{ display:"flex", gap:8, marginBottom:12, flexWrap:"wrap", alignItems:"center" }}>
            <Sel value={selProp} onChange={e => setSelProp(e.target.value)} style={{ marginBottom:0, width:"auto", flex:1 }}>
              {PROPS.map(p => <option key={p.id} value={p.id}>{p.n}</option>)}
            </Sel>
            <Sel value={selYr} onChange={e => setSelYr(parseInt(e.target.value))} style={{ marginBottom:0, width:"auto" }}>
              {[CYR-1, CYR].map(y => <option key={y} value={y}>{y}</option>)}
            </Sel>
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
            {[
              {l:"YTD Rent",      v:gbp(ytdRent), g:true},
              {l:"YTD Mortgage",  v:gbp(ytdMtg),  g:false},
              {l:"YTD Costs",     v:gbp(ytdCosts),g:false},
              {l:"YTD Outgoings", v:gbp(ytdOut),  g:false},
              {l:"YTD Net",       v:(ytdNet>=0?"":"-")+gbp(Math.abs(ytdNet)), g:ytdNet>0},
            ].map((k, i) => (
              <div key={i} style={{ background:"#fff", borderRadius:14, border:"1px solid #e2e8f0", padding:12 }}>
                <div style={{ fontSize:11, color:S.gray, marginBottom:3 }}>{k.l}</div>
                <div style={{ fontSize:18, fontWeight:700, color:k.g?S.green:S.dark }}>{k.v}</div>
              </div>
            ))}
          </div>

          <div style={card}>
            <div style={{ padding:"11px 14px", background:"#f8fafc", borderBottom:"1px solid #f1f5f9", overflowX:"auto" }}>
              <div style={{ display:"grid", gridTemplateColumns:"60px 1fr 1fr 1fr 1fr 1fr", gap:4, fontSize:11, fontWeight:600, color:S.gray, minWidth:340 }}>
                <span>Month</span><span style={{ textAlign:"right" }}>Rent</span><span style={{ textAlign:"right" }}>Mortgage</span><span style={{ textAlign:"right" }}>Jobs</span><span style={{ textAlign:"right" }}>Bills</span><span style={{ textAlign:"right" }}>Net</span>
              </div>

            {months.map(row => (

                  <span style={{ textAlign:"right", color:S.red }}>{gbp(row.mtg)}</span>
                  <span style={{ textAlign:"right", color:row.costs>0?S.red:S.gray }}>{row.costs > 0 ? gbp(row.costs) : "--"}</span>
                  <span style={{ textAlign:"right", color:row.outs>0?S.red:S.gray }}>{row.outs > 0 ? gbp(row.outs) : "--"}</span>
                  <span style={{ textAlign:"right", fontWeight:700, color:row.rent>0?(row.net>0?S.green:row.net<0?S.red:S.gray):S.gray }}>{row.rent>0?(row.net>=0?"":"-")+gbp(Math.abs(row.net)):"--"}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function FinCharts({ tenants, jobs, rp, outgoings }) {
  const barH = 180;

  // Chart 1: Rent vs Mortgage per property (current month)
  const propData = PROPS.map(p => {
    const rent = tenants.filter(t => t.pid === p.id && rp[t.id+"-"+CYR+"-"+CMO]).reduce((s,t)=>s+t.rn,0);
    const fullRent = tenants.filter(t => t.pid === p.id).reduce((s,t)=>s+t.rn,0);
    return { name: p.short||p.n.split(" ")[0], rent, fullRent, mtg: p.mm };
  });
  const maxProp = Math.max(...propData.map(d => Math.max(d.fullRent, d.mtg)), 1);

  // Chart 2: Net profit trend last 6 months
  const netTrend = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(CYR, CMO - i, 1);
    const y = d.getFullYear(), m = d.getMonth();
    const mk = mKey(y, m);
    const rent  = tenants.filter(t => rp[t.id+"-"+y+"-"+m]).reduce((s,t)=>s+t.rn,0);
    const mtg   = PROPS.reduce((s,p)=>s+p.mm,0);
    const costs = jobs.filter(j=>j.status==="done"&&j.date&&j.date.startsWith(mk)).reduce((s,j)=>s+(j.cost||0),0);
    const outs  = PROPS.reduce((s,p)=>{const k=p.id+"-"+mk;return s+(outgoings[k]||[]).reduce((x,o)=>x+(o.amount||0),0);},0);
    netTrend.push({ label: MSHORT[m], net: rent - mtg - costs - outs });
  }
  const maxNet = Math.max(...netTrend.map(d => Math.abs(d.net)), 1);

  // Chart 3: Outgoings by category this month
  const outCats = {};
  PROPS.forEach(p => {
    const k = p.id + "-" + mKey(CYR, CMO);
    (outgoings[k]||[]).forEach(o => {
      outCats[o.label] = (outCats[o.label]||0) + (o.amount||0);
    });
  });
  const outEntries = Object.entries(outCats).sort((a,b)=>b[1]-a[1]);
  const maxOut = Math.max(...outEntries.map(e=>e[1]), 1);

  const barColors = ["#3b82f6","#22c55e","#f59e0b","#ef4444","#8b5cf6","#14b8a6","#f97316","#ec4899"];

  return (
    <div>
      {/* Chart 1: Rent vs Mortgage per property */}
      <div style={{ ...card, ...cardPad }}>
        <div style={{ fontSize:13, fontWeight:600, marginBottom:4 }}>Rent vs Mortgage — {MSHORT[CMO]}</div>
        <div style={{ display:"flex", gap:12, marginBottom:10 }}>
          <div style={{ display:"flex", alignItems:"center", gap:4 }}><div style={{ width:10, height:10, borderRadius:2, background:"#22c55e" }}/><span style={{ fontSize:11, color:S.gray }}>Rent collected</span></div>
          <div style={{ display:"flex", alignItems:"center", gap:4 }}><div style={{ width:10, height:10, borderRadius:2, background:"#ef4444" }}/><span style={{ fontSize:11, color:S.gray }}>Mortgage</span></div>
        </div>
        <div style={{ display:"flex", alignItems:"flex-end", gap:4, height:barH, overflowX:"auto" }}>
          {propData.map((d, i) => (
            <div key={i} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:2, minWidth:36, flex:1 }}>
              <div style={{ display:"flex", alignItems:"flex-end", gap:2, height:barH-20 }}>
                <div style={{ width:14, background:"#22c55e", borderRadius:"3px 3px 0 0", height: Math.max(2, (d.rent/maxProp)*(barH-20)) + "px" }} title={gbp(d.rent)} />
                <div style={{ width:14, background:"#ef4444", borderRadius:"3px 3px 0 0", height: Math.max(2, (d.mtg/maxProp)*(barH-20)) + "px" }} title={gbp(d.mtg)} />
              </div>
              <div style={{ fontSize:9, color:S.gray, textAlign:"center", lineHeight:1.2 }}>{d.name}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Chart 2: Net profit trend */}
      <div style={{ ...card, ...cardPad }}>
        <div style={{ fontSize:13, fontWeight:600, marginBottom:12 }}>Net Profit — Last 6 Months</div>
        <div style={{ display:"flex", alignItems:"flex-end", gap:6, height:barH }}>
          {netTrend.map((d, i) => {
            const h = Math.max(3, (Math.abs(d.net)/maxNet)*(barH-24));
            const isPos = d.net >= 0;
            return (
              <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
                <div style={{ fontSize:9, color:isPos?S.green:S.red, fontWeight:600 }}>{d.net===0?"":isPos?"+"+gbp(d.net):"-"+gbp(Math.abs(d.net))}</div>
                <div style={{ width:"100%", background:isPos?"#22c55e":"#ef4444", borderRadius:"3px 3px 0 0", height:h+"px" }} />
                <div style={{ fontSize:10, color:S.gray }}>{d.label}</div>
              </div>
            );
          })}
        </div>
        <div style={{ fontSize:11, color:S.gray, marginTop:8 }}>Net = rent collected minus mortgages, job costs and bills</div>
      </div>

      {/* Chart 3: Outgoings by category */}
      <div style={{ ...card, ...cardPad }}>
        <div style={{ fontSize:13, fontWeight:600, marginBottom:4 }}>Outgoings by Category — {MSHORT[CMO]}</div>
        {outEntries.length === 0 ? (
          <div style={{ fontSize:12, color:S.gray, padding:"16px 0" }}>No outgoings entered for this month yet</div>
        ) : (
          <div>
            {outEntries.map(([label, amt], i) => (
              <div key={label} style={{ marginBottom:8 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                  <span style={{ fontSize:12 }}>{label}</span>
                  <span style={{ fontSize:12, fontWeight:600, color:S.red }}>{gbp(amt)}</span>
                </div>
                <div style={{ height:6, background:S.light, borderRadius:99, overflow:"hidden" }}>
                  <div style={{ height:"100%", background:barColors[i%barColors.length], borderRadius:99, width:Math.round(amt/maxOut*100)+"%" }} />
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function OutgoingsPage({ outgoings, addOutgoing, deleteOutgoing, fixedOutgoings, setFixedOutgoing, removeFixedOutgoing, jobs, wide }) {
  const [selYr, setSelYr]         = useState(CYR);
  const [selMo, setSelMo]         = useState(CMO);
  const [addingTo, setAddingTo]   = useState(null);
  const [form, setForm]           = useState({ label:"", amount:"", fixed:false });
  const [editingItem, setEditingItem] = useState(null);
  const [editForm, setEditForm]   = useState({ label:"", amount:"" });

  const getPrevOutgoings = pid => {
    const prevMo = selMo === 0 ? 11 : selMo - 1;
    const prevYr = selMo === 0 ? selYr - 1 : selYr;
    const k = pid + "-" + mKey(prevYr, prevMo);
    return outgoings[k] || [];
  };

  const thisMonthItems = pid => outgoings[pid + "-" + mKey(selYr, selMo)] || [];
  const fixedItems     = pid => fixedOutgoings?.[pid] || [];

  const submit = pid => {
    if (!form.label || !form.amount) return;
    const amount = parseFloat(form.amount) || 0;
    addOutgoing(pid, selYr, selMo, { label: form.label, amount });
    if (form.fixed) setFixedOutgoing(pid, form.label, amount);
    setForm({ label:"", amount:"", fixed:false });
    setAddingTo(null);
  };

  const repeatItem = (pid, item) => addOutgoing(pid, selYr, selMo, { label: item.label, amount: item.amount });

  // Auto-suggest fixed items not yet added this month
  const getAutoSuggest = pid => {
    const current = thisMonthItems(pid).map(o => o.label);
    return fixedItems(pid).filter(f => !current.includes(f.label));
  };

  const grid = wide ? { display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 } : {};

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14, flexWrap:"wrap" }}>
        <button onClick={() => { const d = new Date(selYr, selMo-1, 1); setSelYr(d.getFullYear()); setSelMo(d.getMonth()); }} style={{ padding:"6px 12px", borderRadius:9, border:"1px solid #e2e8f0", background:"#fff", cursor:"pointer", fontSize:14 }}>‹</button>
        <span style={{ fontSize:14, fontWeight:600 }}>{MFULL[selMo]} {selYr}</span>
        <button onClick={() => { const d = new Date(selYr, selMo+1, 1); if(d <= new Date(CYR, CMO, 1)){ setSelYr(d.getFullYear()); setSelMo(d.getMonth()); }}} style={{ padding:"6px 12px", borderRadius:9, border:"1px solid #e2e8f0", background:"#fff", cursor:"pointer", fontSize:14 }}>›</button>
      </div>

      <div style={{ background:S.abg, borderRadius:11, padding:"10px 14px", marginBottom:14, fontSize:12, color:S.atx }}>
        💡 Tick "Mark as fixed" when adding a regular bill — it will automatically appear as a green suggestion every month. Amounts can still be edited each time.
      </div>

      <div style={grid}>
        {PROPS.map(p => {
          const isHMO    = p.ty === "HMO";
          const items    = thisMonthItems(p.id);
          const prev     = getPrevOutgoings(p.id);
          const autoSug  = getAutoSuggest(p.id);
          const mk       = mKey(selYr, selMo);
          const billTotal = items.reduce((s, o) => s + (o.amount||0), 0);
          const pJobs    = (jobs||[]).filter(j => j.status==="done" && j.pid===p.id && j.date && j.date.startsWith(mk));
          const jobTotal = pJobs.reduce((s, j) => s + (j.cost||0), 0);
          const total    = billTotal + jobTotal + p.mm;
          const unrepeat = prev.filter(po => !items.find(i => i.label === po.label) && !autoSug.find(a => a.label === po.label));

          return (
            <div key={p.id} style={card}>
              <div style={{ padding:"11px 14px", background:"#f8fafc", borderBottom:"1px solid #f1f5f9", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <div style={{ fontSize:13, fontWeight:600 }}>{p.n}</div>
                  <div style={{ fontSize:11, color:S.gray }}>{p.town} · {p.ty}</div>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:13, fontWeight:700, color:total>0?S.red:S.gray }}>{total>0?gbp(total):"--"}</div>
                  <div style={{ fontSize:11, color:S.gray }}>total this month</div>
                </div>
              </div>


              <div style={{ padding:"9px 14px", borderBottom:"1px solid #f8fafc", display:"flex", justifyContent:"space-between", alignItems:"center", background:"#f8fafc" }}>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{ fontSize:12 }}>💳</span>
                  <span style={{ fontSize:12, fontWeight:600, color:S.mid }}>Mortgage</span>
                </div>
                <span style={{ fontSize:12, fontWeight:700, color:S.red }}>{gbp(p.mm)}</span>
              </div>


              {pJobs.map(j => (
                <div key={j.id} style={{ padding:"9px 14px", borderBottom:"1px solid #f8fafc", display:"flex", justifyContent:"space-between", alignItems:"center", background:"#fffbeb" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <span style={{ fontSize:12 }}>🔧</span>
                    <span style={{ fontSize:12, color:S.atx }}>{j.desc}</span>
                  </div>
                  <span style={{ fontSize:12, fontWeight:700, color:S.amber }}>{gbp(j.cost)}</span>
                </div>
              ))}


              {autoSug.length > 0 && (
                <div style={{ padding:"10px 14px", borderBottom:"1px solid #f8fafc", background:"#f0fdf4" }}>
                  <div style={{ fontSize:11, color:S.gtx, fontWeight:600, marginBottom:6 }}>📌 Fixed bills — tap to add:</div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                    {autoSug.map((f2, i) => (
                      <button key={i} onClick={() => repeatItem(p.id, f2)} style={{ background:"#fff", border:"1px solid #bbf7d0", borderRadius:8, padding:"4px 10px", fontSize:12, cursor:"pointer", fontFamily:"system-ui", color:S.gtx, fontWeight:600 }}>
                        + {f2.label} ({gbp(f2.amount)})
                      </button>
                    ))}
                  </div>
                </div>
              )}


              {unrepeat.length > 0 && (
                <div style={{ padding:"10px 14px", borderBottom:"1px solid #f8fafc", background:"#fffbeb" }}>
                  <div style={{ fontSize:11, color:S.atx, fontWeight:600, marginBottom:6 }}>From last month — tap to add:</div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                    {unrepeat.map((po, i) => (
                      <button key={i} onClick={() => repeatItem(p.id, po)} style={{ background:"#fff", border:"1px solid #fde68a", borderRadius:8, padding:"4px 10px", fontSize:12, cursor:"pointer", fontFamily:"system-ui", color:S.atx, fontWeight:600 }}>
                        + {po.label} ({gbp(po.amount)})
                      </button>
                    ))}
                  </div>
                </div>
              )}


              {items.map((o) => (
                <div key={o.id} style={{ padding:"9px 14px", borderBottom:"1px solid #f8fafc" }}>
                  {editingItem === o.id ? (
                    <div>
                      <Inp value={editForm.label} onChange={e=>setEditForm(f=>({...f,label:e.target.value}))} placeholder="Label" style={{marginBottom:6}} />
                      <Inp type="number" value={editForm.amount} onChange={e=>setEditForm(f=>({...f,amount:e.target.value}))} placeholder="Amount (£)" style={{marginBottom:6}} />
                      <div style={{display:"flex",gap:8}}>
                        <Btn onClick={()=>{
                          deleteOutgoing(p.id, selYr, selMo, o.id);
                          addOutgoing(p.id, selYr, selMo, { label:editForm.label, amount:parseFloat(editForm.amount)||0 });
                          setEditingItem(null);
                        }} style={{flex:1,padding:10,marginBottom:0}}>Save</Btn>
                        <button onClick={()=>setEditingItem(null)} style={{padding:"10px 14px",borderRadius:10,background:S.light,border:"none",cursor:"pointer",fontFamily:"system-ui",fontWeight:600}}>Cancel</button>
                      </div>
                    </div>
                  ):(
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <span style={{fontSize:13}}>{o.label}</span>
                        {fixedItems(p.id).find(f2=>f2.label===o.label) && <span style={{fontSize:10,color:S.gtx,fontWeight:600,marginLeft:6}}>📌 fixed</span>}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:13,fontWeight:600,color:S.red}}>{gbp(o.amount)}</span>
                        <button onClick={()=>{setEditingItem(o.id);setEditForm({label:o.label,amount:String(o.amount)});}} style={{width:28,height:28,borderRadius:"50%",border:"none",cursor:"pointer",background:S.light,fontSize:12}}>✏️</button>
                        <button onClick={()=>deleteOutgoing(p.id,selYr,selMo,o.id)} style={{width:28,height:28,borderRadius:"50%",border:"none",cursor:"pointer",background:S.rbg,fontSize:12}}>✕</button>
                      </div>
                    </div>
                  )}
                </div>
              ))}

              {/* Add new */}
              <div style={{ padding:"10px 14px" }}>
                {addingTo === p.id ? (
                  <div>
                    <Inp placeholder={isHMO ? "e.g. Energy, Water, Council Tax..." : "e.g. Insurance..."} value={form.label} onChange={e => setForm(f => ({ ...f, label:e.target.value }))} />
                    <Inp placeholder="Amount (£)" type="number" value={form.amount} onChange={e => setForm(f => ({ ...f, amount:e.target.value }))} />
                    <label style={{ display:"flex", alignItems:"center", gap:8, fontSize:12, color:S.dark, marginBottom:10, cursor:"pointer" }}>
                      <input type="checkbox" checked={form.fixed} onChange={e=>setForm(f=>({...f,fixed:e.target.checked}))} />
                      Mark as fixed bill (auto-suggest every month)
                    </label>
                    <div style={{ display:"flex", gap:8 }}>
                      <Btn onClick={() => submit(p.id)} style={{ flex:1, padding:10, marginBottom:0 }}>Add</Btn>
                      <button onClick={() => { setAddingTo(null); setForm({ label:"", amount:"", fixed:false }); }} style={{ padding:"10px 14px", borderRadius:10, background:S.light, border:"none", cursor:"pointer", fontFamily:"system-ui", fontWeight:600 }}>Cancel</button>
                    </div>
                  </div>
                ) : (
                  <button onClick={() => setAddingTo(p.id)} style={{ fontSize:12, color:S.mid, fontWeight:600, background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:4, padding:"4px 0", fontFamily:"system-ui" }}>+ Add outgoing</button>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function RefinancePage() {

  // BTL mortgages are interest-only: monthly payment = balance × rate / 12
  const ioPayment = (balance, rate) => Math.round(balance * (rate/100) / 12);

  return (
    <div>
      <div style={{ ...card, ...cardPad, marginBottom:10 }}>
        <div style={{ fontSize:13, fontWeight:600, marginBottom:4 }}>Test a rate scenario</div>

        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:8 }}>

          <span style={{ fontSize:18, fontWeight:700, minWidth:50, color:S.dark }}>{testRate.toFixed(1)}%</span>
        </div>
        <div style={{ fontSize:11, color:S.gray }}>Total at {testRate.toFixed(1)}%: <span style={{ fontWeight:700, color:S.dark }}>{gbp(MTGS.filter(m=>m.l!=="70 Coal Hill Lane (Home)").reduce((s,m)=>s+ioPayment(m.b,testRate),0))}/mo</span> vs current <span style={{ fontWeight:700 }}>{gbp(MTGS.filter(m=>m.l!=="70 Coal Hill Lane (Home)").reduce((s,m)=>s+m.m,0))}/mo</span></div>

                <div style={{ fontSize:11, color:S.gray }}>Current</div>
                <div style={{ fontSize:13, fontWeight:700 }}>{gbp(m.m)}/mo</div>
              </div>
              <div style={{ background:diff>50?"#fff5f5":diff<-50?"#f0fdf4":S.light, borderRadius:9, padding:10 }}>
                <div style={{ fontSize:11, color:S.gray }}>At {testRate.toFixed(1)}%</div>
                <div style={{ fontSize:13, fontWeight:700, color:diff>50?S.red:diff<-50?S.green:S.dark }}>{gbp(newPayment)}/mo</div>

}

function TaxPage({ tenants, jobs, rp, outgoings, wide }) {
  const currentTaxYr = now.getMonth() >= 3 ? CYR : CYR - 1;
  const [selTaxYr, setSelTaxYr] = useState(currentTaxYr);
  const [copied, setCopied] = useState(false);

  // Months in this tax year: Apr (3) to Mar (2) next year
  const txMonths = [];
  for (let i = 0; i < 12; i++) {
    const m = (3 + i) % 12;
    const y = i < 9 ? selTaxYr : selTaxYr + 1;
    txMonths.push({ y, m, mk: mKey(y, m) });
  }

  const totalRent = txMonths.reduce((s, { y, m }) =>
    s + tenants.filter(t => rp[t.id+"-"+y+"-"+m]).reduce((x, t) => x + t.rn, 0), 0);

  const totalMaintenance = txMonths.reduce((s, { mk }) =>
    s + jobs.filter(j => j.status==="done" && j.date && j.date.startsWith(mk)).reduce((x, j) => x + (j.cost||0), 0), 0);

  const totalBills = txMonths.reduce((s, { mk }) =>
    s + PROPS.reduce((x, p) => x + (outgoings[p.id+"-"+mk]||[]).reduce((z, o) => z + (o.amount||0), 0), 0), 0);

  // Estimated mortgage interest (approximate — actual from lender statements)
  const estMtgInterest = MTGS.filter(m => m.l !== "70 Coal Hill Lane (Home)").reduce((s, m) => s + m.b * (m.r||5) / 100, 0);
  const mtgInterestCredit = estMtgInterest * 0.20; // 20% tax credit under Section 24

  const totalExpenses = totalMaintenance + totalBills;
  const netProfit = totalRent - totalExpenses;
  // Basic rate tax estimate (20% on profit, minus mortgage interest credit)
  const taxEstimate = Math.max(0, netProfit * 0.20 - mtgInterestCredit);

  const copyText = () => {
    const txt = [
      `Property P&L — Tax Year ${selTaxYr}/${selTaxYr+1}`,
      ``,
      `Total Rental Income:    ${gbp(totalRent)}`,
      `Maintenance Costs:      ${gbp(totalMaintenance)}`,
      `Bills & Outgoings:      ${gbp(totalBills)}`,
      `Total Expenses:         ${gbp(totalExpenses)}`,
      `Net Profit:             ${gbp(netProfit)}`,
      ``,
      `Est. Mortgage Interest: ${gbp(estMtgInterest)} (approx — verify with lender)`,
      `20% Tax Credit:         ${gbp(mtgInterestCredit)}`,
      `Est. Tax (basic rate):  ${gbp(taxEstimate)}`,
      ``,
      `Note: This is an estimate only. Confirm figures with your accountant.`,
    ].join("\n");
    navigator.clipboard.writeText(txt).catch(() => {});
    setCopied(true);
    setTimeout(() => setCopied(false), 2500);
  };

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
        <span style={{ fontSize:13, fontWeight:600 }}>Tax year</span>
        <Sel value={selTaxYr} onChange={e => setSelTaxYr(parseInt(e.target.value))} style={{ marginBottom:0, width:"auto" }}>
          {[currentTaxYr-1, currentTaxYr].map(y => <option key={y} value={y}>{y}/{y+1}</option>)}
        </Sel>
      </div>

      <div style={{ background:S.abg, borderRadius:11, padding:"10px 14px", marginBottom:14, fontSize:12, color:S.atx, lineHeight:1.6 }}>
        ⚠️ This is an <strong>estimate only</strong> based on data in the app. Always verify with your accountant before submitting your self assessment.
      </div>

      <div style={{ display:"grid", gridTemplateColumns:wide?"1fr 1fr 1fr":"1fr 1fr", gap:10, marginBottom:12 }}>
        {[
          {l:"Rental Income",     v:gbp(totalRent),          s:"Gross rent collected",        g:true},
          {l:"Maintenance",       v:gbp(totalMaintenance),   s:"Jobs & repairs",              g:false},
          {l:"Bills & Outgoings", v:gbp(totalBills),         s:"Energy, insurance etc",       g:false},
          {l:"Total Expenses",    v:gbp(totalExpenses),      s:"All allowable costs",         g:false},
          {l:"Net Profit",        v:gbp(netProfit),          s:"Before tax",                  g:netProfit>0},
          {l:"Est. Tax (20%)",    v:gbp(taxEstimate),        s:"After mortgage interest credit",g:false},
        ].map((k,i) => (
          <div key={i} style={{ background:"#fff", borderRadius:14, border:"1px solid #e2e8f0", padding:12 }}>
            <div style={{ fontSize:11, color:S.gray, marginBottom:3 }}>{k.l}</div>
            <div style={{ fontSize:18, fontWeight:700, color:k.g?S.green:S.dark }}>{k.v}</div>
            <div style={{ fontSize:11, color:S.gray, marginTop:2 }}>{k.s}</div>
          </div>
        ))}
      </div>

      <div style={{ ...card, ...cardPad, marginBottom:10 }}>
        <div style={{ fontSize:13, fontWeight:600, marginBottom:4 }}>Section 24 — Mortgage Interest</div>
        <div style={{ fontSize:12, color:S.gray, lineHeight:1.6, marginBottom:8 }}>

function TimelinePage({ tenants, comp, wide }) {
  const [days, setDays] = useState(30);
  const cutoff = new Date(now.getFullYear(), now.getMonth(), now.getDate() + days);
  const events = [];

  // Rent due dates this month
  tenants.forEach(t => {
    const p = PROPS.find(x => x.id === t.pid);
    const due = new Date(CYR, CMO, t.dy);
    if (due >= now && due <= cutoff) {
      events.push({ date:due, icon:"💷", label:t.nm+" — rent due", sub:p?p.n:"", color:S.green, priority:1 });
    }
  });

  // Compliance expiries
  comp.forEach(c => {
    const d = du(c.next);
    if (c.next && d >= 0 && d <= days) {
      const ct = CTYPES.find(x=>x.k===c.type), pp = PROPS.find(p=>p.id===c.pid);
      events.push({ date:new Date(c.next), icon:"🛡", label:(ct?ct.l:"Compliance")+" expiry", sub:pp?pp.n:"", color:d<=14?S.red:S.amber, priority:d<=14?0:2 });
    }
  });

  // Mortgage expiries
  MTGS.forEach(m => {
    const d = du(m.e);
    if (m.e && d >= 0 && d <= days) {
      events.push({ date:new Date(m.e), icon:"💳", label:"Mortgage expires — "+m.ldr, sub:m.l, color:d<=30?S.red:S.amber, priority:d<=30?0:2 });
    }
  });

  events.sort((a,b) => a.date - b.date);

  const formatDate = d => d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
  const t0=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const daysUntilEv=d=>Math.round((new Date(d.getFullYear(),d.getMonth(),d.getDate())-t0)/86400000);

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
        <span style={{ fontSize:13, fontWeight:600 }}>Show next</span>
        {[30,60,90].map(d => (
          <button key={d} onClick={()=>setDays(d)} style={{ padding:"6px 14px", borderRadius:9, border:"1px solid #e2e8f0", background:days===d?S.dark:"#fff", color:days===d?"#fff":S.dark, fontWeight:600, fontSize:13, cursor:"pointer", fontFamily:"system-ui" }}>
            {d}d
          </button>
        ))}
      </div>

      {events.length === 0 && (
        <div style={{ textAlign:"center", padding:"50px 0", color:S.gray }}>
          <div style={{ fontSize:36, marginBottom:10 }}>📅</div>
          <div>Nothing coming up in the next {days} days</div>
        </div>
      )}

      {events.map((ev, i) => {
        const dUntil = daysUntilEv(ev.date);
        return (
          <div key={i} style={{ ...card, ...cardPad, borderLeft:"3px solid "+ev.color }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
              <div style={{ display:"flex", gap:10, alignItems:"flex-start" }}>
                <span style={{ fontSize:20, flexShrink:0 }}>{ev.icon}</span>
                <div>
                  <div style={{ fontSize:13, fontWeight:600 }}>{ev.label}</div>
                  <div style={{ fontSize:11, color:S.gray }}>{ev.sub}</div>
                </div>
              </div>
              <div style={{ textAlign:"right", flexShrink:0, marginLeft:8 }}>
                <div style={{ fontSize:13, fontWeight:700, color:ev.color }}>{dUntil === 0 ? "Today" : dUntil === 1 ? "Tomorrow" : "in "+dUntil+"d"}</div>
                <div style={{ fontSize:11, color:S.gray }}>{formatDate(ev.date)}</div>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
          <div style={{ background:S.light, borderRadius:10, padding:10 }}>

          <div style={{ background:"#f0fdf4", borderRadius:10, padding:10 }}>
            <div style={{ fontSize:11, color:S.gray }}>After {rate}% increase</div>
            <div style={{ fontSize:16, fontWeight:700, color:S.green }}>{gbp(newTotal)}/mo</div>
          </div>
        </div>
        <div style={{ fontSize:11, color:S.green, fontWeight:600, marginTop:8 }}>

                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:11, color:S.gray }}>{gbp(propTotal)} → <span style={{ color:S.green, fontWeight:700 }}>{gbp(propNew)}</span></div>
                  <div style={{ fontSize:11, color:S.green }}>+{gbp(propNew-propTotal)}/mo</div>
                </div>
              </div>
              {pt.map((t,i) => {
                const newRent = Math.round(t.rn * (1+rate/100));
                return (
                  <div key={t.id} style={{ padding:"10px 14px", borderBottom:i<pt.length-1?"1px solid #f8fafc":"none", display:"flex", justifyContent:"space-between", alignItems:"center" }}>

                    </div>

function MtgInterestPage({ wide }) {
  const SK_VALS = "ash-prop-vals";
  const [vals] = useState(() => {
    try { return JSON.parse(localStorage.getItem(SK_VALS)) || {}; } catch { return {}; }
  });

  const getV = p => vals[p.id+"_v"] ?? p.v;

  const annualInterest = MTGS.map(m => ({
    label: m.l,
    ldr: m.ldr,
    balance: m.b,
    rate: m.r,
    annual: m.r != null ? Math.round(m.b * m.r / 100) : null,
    monthly: m.m,
  }));

  const totalAnnualInterest = annualInterest.filter(m=>m.annual!=null).reduce((s,m)=>s+m.annual,0);
  const totalBalance        = MTGS.reduce((s,m)=>s+m.b,0);
  const portfolioValue      = PROPS.reduce((s,p)=>s+getV(p),0);
  const totalEquity         = portfolioValue - totalBalance;

  // Estimate equity built per year via appreciation (conservative 3%)
  const annualAppreciation  = Math.round(portfolioValue * 0.03);

  return (
    <div>
      <div style={{ background:S.abg, borderRadius:11, padding:"10px 14px", marginBottom:12, fontSize:12, color:S.atx, lineHeight:1.6 }}>

        {[
          {l:"Annual interest cost", v:gbp(totalAnnualInterest), s:"Across all mortgages",     g:false},
          {l:"Est. annual appreciation", v:gbp(annualAppreciation), s:"At 3% — your equity gain",g:true},
          {l:"Net equity position",  v:gbp(annualAppreciation-totalAnnualInterest), s:"Appreciation minus interest", g:annualAppreciation>totalAnnualInterest},
          {l:"Total interest/month", v:gbp(Math.round(totalAnnualInterest/12)), s:"What you pay in interest",   g:false},

          <div key={i} style={{ background:"#fff", borderRadius:14, border:"1px solid #e2e8f0", padding:12 }}>

            <div style={{ fontSize:18, fontWeight:700, color:k.g?S.green:S.dark }}>{k.v}</div>
            <div style={{ fontSize:11, color:S.gray, marginTop:2 }}>{k.s}</div>

      </div>

      <div style={card}>
        <div style={{ padding:"11px 14px", background:"#f8fafc", borderBottom:"1px solid #f1f5f9", display:"grid", gridTemplateColumns:"1fr 70px 70px 70px", gap:4, fontSize:11, fontWeight:600, color:S.gray }}>

              <div style={{ fontWeight:600, fontSize:12 }}>{m.label.split(" ").slice(0,3).join(" ")}</div>
              <div style={{ fontSize:10, color:S.gray }}>{m.ldr}</div>
